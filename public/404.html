<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <title>無人機操作證學科題庫</title>
    <script>
      // Single-page app redirect for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.host +
          '/?/' +
          l.pathname.slice(1).replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
</html>
