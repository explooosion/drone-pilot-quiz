name: Update Question Banks

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download and parse question banks
        run: node scripts/update-questions.mjs

      - name: Validate question banks
        run: node scripts/check-data.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ public/question/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ public/question/
          git commit -m "chore: update question banks [bot]"
          git push
